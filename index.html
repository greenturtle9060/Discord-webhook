<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Sender</title>

<style>
:root {
  --bg: #0f0f14;
  --card: #1c1f26;
  --accent: #5865F2;
  --text: #ffffff;
  --muted: #aaa;
  --success: #3ba55d;
  --error: #ed4245;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: system-ui, Arial;
  background: var(--bg);
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 15px;
}

.container {
  background: var(--card);
  padding: 20px;
  border-radius: 12px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h3 {
  margin-top: 0;
  text-align: center;
}

input, textarea, button {
  width: 100%;
  margin-top: 12px;
  padding: 10px;
  border-radius: 6px;
  border: none;
  font-size: 14px;
}

input, textarea {
  background: #2a2d36;
  color: white;
}

textarea {
  resize: vertical;
  min-height: 90px;
}

input:focus, textarea:focus {
  outline: 2px solid var(--accent);
}

button {
  background: var(--accent);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  opacity: 0.9;
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.file-label {
  font-size: 13px;
  color: var(--muted);
  margin-top: 10px;
}

.status {
  margin-top: 12px;
  font-size: 13px;
  text-align: center;
}

.status.success { color: var(--success); }
.status.error { color: var(--error); }

.char-count {
  font-size: 12px;
  color: var(--muted);
  text-align: right;
  margin-top: 4px;
}

/* Responsive tweaks */
@media (max-width: 480px) {
  .container {
    padding: 15px;
  }
}
</style>
</head>

<body>

<div class="container">
  <h3>Discord Webhook Sender</h3>

  <input type="text" id="webhook" placeholder="Enter webhook URL">

  <textarea id="message" placeholder="Type your message..."></textarea>
  <div class="char-count" id="charCount">0 characters</div>

  <div class="file-label">Attach file (optional)</div>
  <input type="file" id="file">

  <button id="sendBtn" onclick="send()">Send Message</button>

  <div id="status" class="status"></div>
</div>

<script>
const messageInput = document.getElementById("message");
const charCount = document.getElementById("charCount");

messageInput.addEventListener("input", () => {
  charCount.textContent = messageInput.value.length + " characters";
});

async function send() {
  const webhook = document.getElementById("webhook").value.trim();
  const message = messageInput.value.trim();
  const fileInput = document.getElementById("file");
  const btn = document.getElementById("sendBtn");
  const status = document.getElementById("status");

  status.textContent = "";

  if (!webhook) {
    status.textContent = "⚠️ Please enter a webhook URL";
    status.className = "status error";
    return;
  }

  btn.disabled = true;
  btn.textContent = "Sending...";

  const formData = new FormData();
  formData.append("content", message);

  if (fileInput.files.length > 0) {
    formData.append("file", fileInput.files[0]);
  }

  try {
    const res = await fetch(webhook, {
      method: "POST",
      body: formData
    });

    if (res.ok) {
      status.textContent = "✅ Message sent successfully!";
      status.className = "status success";
      messageInput.value = "";
      charCount.textContent = "0 characters";
      fileInput.value = "";
    } else {
      throw new Error("Request failed");
    }
  } catch (err) {
    status.textContent = "❌ Failed to send message";
    status.className = "status error";
    console.error(err);
  }

  btn.disabled = false;
  btn.textContent = "Send Message";
}
</script>

</body>
</html>
